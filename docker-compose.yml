version: '3.9'

services:
  # ── قاعدة البيانات ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: voucher_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-voucherdb}
      POSTGRES_USER: ${POSTGRES_USER:-voucheruser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voucherpass}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-voucheruser} -d ${POSTGRES_DB:-voucherdb}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── الباك اند ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voucher_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-voucheruser}:${POSTGRES_PASSWORD:-voucherpass}@db:5432/${POSTGRES_DB:-voucherdb}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      PORT: 5000
      NODE_ENV: production
    volumes:
      - ./backend/uploads:/app/uploads # 🔥 المهم (حفظ الملفات)
    expose:
      - "5000"

  # ── الفرونت اند (nginx) ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: voucher_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  db_data:
